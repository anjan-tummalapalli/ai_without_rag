[tool.poetry]
name = "ai-cli"
version = "0.2.0"
description = "AI CLI gateway for multi-provider LLM orchestration and RAG."
authors = ["Your Name <youremail@example.com>"]
license = "MIT"
readme = "README.md"
homepage = "https://github.com/yourusername/ai-cli"
repository = "https://github.com/yourusername/ai-cli"
documentation = "https://github.com/yourusername/ai-cli/docs"
keywords = [
    "ai",
    "llm",
    "cli",
    "openai",
    "anthropic",
    "gemini",
    "grok",
    "cohere",
    "devops",
    "sre",
    "ai-gateway",
    "observability",
    "RAG",
    "retrieval-augmented-generation",
    "vector-db",
    "chroma",
    "qdrant",
    "pinecone",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: System :: Distributed Computing",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
packages = [{ include = "ai_cli", from = "src" }]

# -----------------------------------------------------------------------------
# Runtime Dependencies
# -----------------------------------------------------------------------------

[tool.poetry.dependencies]
sentence-transformers = "^5.0.0"
python = "^3.10"
# Core Providers
openai = "^1.30.0"
anthropic = "^0.25.0"
google-generativeai = "^0.5.0"
cohere = "^5.5.0"
groq = "^0.8.0"
mistralai = "^1.0.0"
together = "^1.2.0"
# HTTP / Networking
httpx = "^0.27.0"
requests = "^2.32.0"
# Retry / Resilience
tenacity = "^8.3.0"
# Observability
prometheus-client = "^0.20.0"
opentelemetry-api = "^1.25.0"
opentelemetry-sdk = "^1.25.0"
opentelemetry-exporter-otlp = "^1.25.0"
# Validation / Config
pydantic = "^2.7.0"
python-dotenv = "^1.0.1"
# CLI UX
rich = "^13.7.0"
typer = "^0.12.3"
# Async Support
anyio = "^4.4.0"
# Structured Logging
structlog = "^24.2.0"
# Tokenization / AI Utilities
tiktoken = "^0.8.0"

faiss-cpu = "^1.8.0"
numpy = "^2.0.0"
pypdf = "^5.0.0"
markdown = "^3.7"

# -----------------------------------------------------------------------------
# Optional Dependency Groups
# -----------------------------------------------------------------------------

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.0"
pytest-cov = "^5.0.0"
pytest-timeout = "^2.3.1"
pytest-asyncio = "^0.23.7"
black = "^24.4.2"
ruff = "^0.4.4"
mypy = "^1.10.0"
pre-commit = "^3.7.1"
types-requests = "^2.32.0.20240523"

# Advanced RAG support: chunking, embedding, vector DB connectors, and helpers.
[tool.poetry.group.rag.dependencies]
# Higher level orchestration (optional)
langchain = "^0.3.0"
langchain-core = "^0.3.0"
langchain-community = "^0.3.0"
# Vector DB clients (choose as needed)
chromadb = "^0.5.0"
qdrant-client = "^1.6.0"
pymilvus = "^2.2.0"
weaviate-client = "^4.4.0"

# Document parsing / chunking / OCR helpers
unstructured = "^0.7.0"
nltk = "^3.8.1"
# Tokenizers / transformer helpers for chunking/encoding
transformers = "^4.35.0"
sentencepiece = "^0.1.99"
ftfy = "^6.1.1"
# Optional utilities for embedding and similarity search
scikit-learn = "^1.2.2"

# Documentation tooling (docs related to RAG workflow, examples)
[tool.poetry.group.docs.dependencies]
mkdocs = "^1.6.0"
mkdocs-material = "^9.0.0"
mkdocstrings = "^0.18.0"
sphinx = "^6.2.0"
sphinx-autodoc-typehints = "^1.23.0"

# -----------------------------------------------------------------------------
# CLI Entrypoint
# -----------------------------------------------------------------------------

[tool.poetry.scripts]
ai-cli = "ai_cli.cli:main"
ai-cli-rag = "ai_cli.rag:main"

# -----------------------------------------------------------------------------
# Build System
# -----------------------------------------------------------------------------

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

# -----------------------------------------------------------------------------
# Black
# -----------------------------------------------------------------------------

[tool.black]
line-length = 88
target-version = ["py310","py311","py312"]

# -----------------------------------------------------------------------------
# Ruff
# -----------------------------------------------------------------------------

[tool.ruff]
line-length = 88
target-version = "py310"
lint.select = ["E","F","I","UP","B"]
lint.ignore = ["E501"]

# -----------------------------------------------------------------------------
# Mypy
# -----------------------------------------------------------------------------

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
warn_unused_ignores = true

# -----------------------------------------------------------------------------
# Pytest
# -----------------------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = """
-v
--strict-markers
--cov=src/ai_cli
--cov-report=term-missing
"""
markers = ["integration","slow","provider","rag"]

# -----------------------------------------------------------------------------
# Coverage
# -----------------------------------------------------------------------------

[tool.coverage.run]
source = ["src/ai_cli"]
branch = true

# -----------------------------------------------------------------------------
# Coverage Report
# -----------------------------------------------------------------------------

[tool.coverage.report]
show_missing = true
skip_covered = true
