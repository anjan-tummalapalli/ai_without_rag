name: CI

on:
  push:
  pull_request:

jobs:
  test:
    # make the repository secret available to all steps in this job
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------------------------
      # Checkout
      # ---------------------------------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Python Setup
      # ---------------------------------------------------------

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # ---------------------------------------------------------
      # Install Poetry
      # ---------------------------------------------------------

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      # ---------------------------------------------------------
      # Remove Old Environments
      # ---------------------------------------------------------

      - name: Remove Old Poetry Environments
        run: |
          poetry env remove --all || true

      # ---------------------------------------------------------
      # Clear Poetry Cache
      # ---------------------------------------------------------

      - name: Clear Poetry Cache
        run: |
          poetry cache clear pypi --all || true

      # ---------------------------------------------------------
      # Debug pyproject.toml
      # ---------------------------------------------------------

      - name: Debug pyproject.toml
        run: |
          echo "===== pyproject.toml ====="
          cat pyproject.toml

      # ---------------------------------------------------------
      # Debug poetry.lock
      # ---------------------------------------------------------

      - name: Debug poetry.lock
        run: |
          echo "===== poetry.lock ====="

          if [ -f poetry.lock ]; then
            cat poetry.lock | grep perplexity || true
          else
            echo "poetry.lock missing"
          fi

      # ---------------------------------------------------------
      # Install Dependencies
      # ---------------------------------------------------------

      - name: Install Dependencies
        run: |
          poetry install --no-cache --no-interaction -vvv

      # ---------------------------------------------------------
      # Show Installed Packages
      # ---------------------------------------------------------

      - name: Show Installed Packages
        run: |
          poetry show

      # ---------------------------------------------------------
      # Run Tests
      # ---------------------------------------------------------

      - name: Run Tests
        run: |
          poetry run pytest -v